name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# Asset naming must match the install script in
# apps/get-corelink-worker/src/install.ts which constructs:
#   corelink-${uname -s | lowercase}-${uname -m}
# e.g. corelink-linux-x86_64, corelink-darwin-aarch64

jobs:
  build:
    name: build / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            # uname -s → linux, uname -m → x86_64
            asset: corelink-linux-x86_64
            use_cross: false

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            # musl variant for Alpine/static linking; installer OS still "linux"
            asset: corelink-linux-x86_64-musl
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            # uname -s → darwin, uname -m → x86_64
            asset: corelink-darwin-x86_64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            # uname -s → darwin, uname -m → aarch64
            asset: corelink-darwin-aarch64
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            # Windows ships as .exe; installer does not use this path
            asset: corelink-windows-x86_64.exe
            use_cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        # actions/checkout v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        # dtolnay/rust-toolchain stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        # Swatinem/rust-cache v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (musl / aarch64)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} -p corelink

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }} -p corelink

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/corelink" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/corelink.exe" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        # actions/upload-artifact v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        # actions/checkout v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        # actions/download-artifact v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        # softprops/action-gh-release v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
